name: Fetch Tennis Data

on:
  # Schedule disabled for the off-season. The 2027 season starts the
  # 2nd week of March 2027 — re-enable then (and bump --year to 2027):
  # schedule:
  #   - cron: '0 */4 * 3-6 *'  # every 4 hours, March-June only
  workflow_dispatch: # Allow manual triggers

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests geopy numpy

      - name: Discover active schools (most wins)
        run: python fetch_most_wins.py --year 2026

      - name: Fetch boys data
        run: python fetch_data.py --year 2026 --gender 1 --output data/2026

      - name: Fetch girls data
        run: python fetch_data.py --year 2026 --gender 2 --output data/2026

      - name: Regenerate site
        run: python generate_site.py

      - name: Generate weekly rankings
        run: python scripts/generate_weekly_rankings.py --all

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/2026/ index.html public/ oregon_schools.csv
          git diff --staged --quiet || (git commit -m "Update 2026 tennis data $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
