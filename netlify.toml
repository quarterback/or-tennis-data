# Netlify config additions for the SD1 draw tool.
# Build settings (publish dir, build command) are intentionally NOT set here
# so we don't override whatever the Netlify dashboard already has working
# (publish dir = public/, pretty URLs on).
# We only declare the functions directory; URL routing for the SD1 pages
# happens automatically via Netlify's standard publish-dir handling.

[build]
  functions = "netlify/functions"

# /api/draws/<id> is wired via config.path inside netlify/functions/draws.mjs
# (Netlify Functions v2 path-based routing) — no redirect rule needed.
